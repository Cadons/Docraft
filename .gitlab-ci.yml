stages:
  - build
  - test
  - docs
  - deploy


default:
  image: gcc:14

.build_env: &build_env
  before_script:
    - apt-get update -y
    - apt-get install -y cmake make libgtest-dev libhpdf-dev libpugixml-dev nlohmann-json3-dev
    - g++ --version
    - cmake --version


build:
  stage: build
  <<: *build_env
  script:
    - mkdir -p build
    - cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
    - cmake --build . --config Release -- -j"$(nproc)"
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test:
  stage: test
  <<: *build_env
  needs:
    - build
  script:
    - cd build
    - ctest -C Release --output-on-failure --output-junit test-results.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  artifacts:
    when: always
    reports:
      junit: build/test-results.xml
    expire_in: 1 week

docs:
  stage: docs
  image: python:3.9
  before_script:
    - apt-get update -y
    - apt-get install -y doxygen graphviz
    - python --version
    - doxygen --version
  script:
    - cd doc
    - pip install -r requirements.txt
    - sphinx-build -b html source build/html
  artifacts:
    paths:
      - doc/build/html/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

pages:
  stage: deploy
  image: busybox
  needs:
    - docs
  script:
    - mkdir -p public
    - cp -r doc/build/html/* public/
    - touch public/.nojekyll
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
